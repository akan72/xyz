`.github/workflows/pr-preview-cleanup.yml`:

```yaml
name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]

# Pin Wrangler to a single exact version everywhere so CI matches what
# you'd get running `npx wrangler@${WRANGLER_VERSION}` locally.
env:
  WRANGLER_VERSION: "4.90.0"

jobs:
  cleanup:
    name: Delete preview Worker
    runs-on: ubuntu-latest
    # Forks never had a preview deployed (secrets aren't exposed to PRs
    # from forks), so there's nothing to clean up.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Delete preview Worker
        id: delete
        run: |
          set -uo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_NAME="xyz-pr-${PR_NUMBER}"
          echo "preview_name=${PREVIEW_NAME}" >>"$GITHUB_OUTPUT"
          echo "Deleting Worker: ${PREVIEW_NAME}"

          # Tolerate failure: the most likely reason `wrangler delete`
          # exits non-zero here is that the Worker was never created
          # (e.g. the deploy job failed on every commit of the PR), so
          # cleanup is effectively a no-op.
          if npx --yes wrangler@${{ env.WRANGLER_VERSION }} delete \
              --name "${PREVIEW_NAME}"; then
            echo "deleted=true" >>"$GITHUB_OUTPUT"
          else
            echo "::warning::wrangler delete returned non-zero — assuming Worker was already gone"
            echo "deleted=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PREVIEW_NAME: ${{ steps.delete.outputs.preview_name }}
          DELETED: ${{ steps.delete.outputs.deleted }}
        with:
          script: |
            const marker = '<!-- preview-deployment -->';
            const previewName = process.env.PREVIEW_NAME;
            const deleted = process.env.DELETED === 'true';
            const action = context.payload.pull_request.merged ? 'merged' : 'closed';
            const status = deleted
              ? `Preview environment \`${previewName}\` torn down (PR ${action}).`
              : `Preview environment \`${previewName}\` was already gone — nothing to tear down (PR ${action}).`;
            const body = [
              marker,
              '### Cloudflare Workers preview',
              '',
              status,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
