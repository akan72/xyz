repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all --check
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
      - id: cargo-check-wasm
        name: cargo check --target wasm32-unknown-unknown
        entry: cargo check --target wasm32-unknown-unknown
        language: system
        pass_filenames: false
